openapi: 3.0.0
info:
  title: Cluster Manager API Doc
  version: 0.1.0
paths:
  /clustermanager/v1/accounts:
    get:
      summary: 查询Cloud 账号列表, 主要用于权限资源查询
      description: 根据查询条件过滤Cloud 账号列表，如果某项条件值为空，则忽略此条件。如果所有条件都为空，则默认查询所有账号
      operationId: ClusterManager_ListCloudAccountToPerm
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerListCloudAccountPermResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      parameters:
        - name: projectID
          description: projectID. CloudAccount所属的项目信息，用于查询所属项目的云凭证
          in: query
          required: false
          schema:
            type: string
        - name: accountID
          description: accountID. 云账号列表
          in: query
          required: false
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: accountName
          description: accountName. 查询具体cloud账号详情
          in: query
          required: false
          schema:
            type: string
      tags:
        - ClusterManager
  /clustermanager/v1/addfederatedcluster:
    post:
      summary: 将Cluster加入联邦Cluster
      description: 将Cluster加入联邦Cluster
      operationId: ClusterManager_AddFederatedCluster
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerAddFederatedClusterResp"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/clustermanagerAddFederatedClusterReq"
        required: true
      tags:
        - ClusterManager
  /clustermanager/v1/autoscalingoption:
    get:
      summary: 查询ClusterAutoScalingOption列表
      description: 根据查询条件过滤ClusterAutoScalingOption列表，如果某项条件值为空，则忽略此条件。如果所有条件都为空，则默认查询所有集群
      operationId: ClusterManager_ListAutoScalingOption
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerListAutoScalingOptionResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      parameters:
        - name: clusterID
          description: clusterID. AutoScalingOption所关联的集群，该ID为BCS集群ID
          in: query
          required: false
          schema:
            type: string
        - name: projectID
          description: projectID. AutoScalingOption所关联项目信息
          in: query
          required: false
          schema:
            type: string
        - name: creator
          description: creator. AutoScalingOption创建者
          in: query
          required: false
          schema:
            type: string
        - name: updater
          description: updater. AutoScalingOption更新者
          in: query
          required: false
          schema:
            type: string
      tags:
        - ClusterManager
    post:
      summary: 创建ClusterAutoScalingOption
      description: 创建ClusterAutoScalingOption，用于cluster-autoscaler配置
      operationId: ClusterManager_CreateAutoScalingOption
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerCreateAutoScalingOptionResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/clustermanagerCreateAutoScalingOptionRequest"
        required: true
      tags:
        - ClusterManager
  "/clustermanager/v1/autoscalingoption/{clusterID}":
    get:
      summary: 查询ClusterAutoScalingOption
      description: 查询指定集群的的ClusterAutoScalingOption信息
      operationId: ClusterManager_GetAutoScalingOption
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerGetAutoScalingOptionResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      parameters:
        - name: clusterID
          description: BCS集群ID
          in: path
          required: true
          schema:
            type: string
        - name: provider
          description: provider. CA所属云provider, 可以为空; 为空时, 复用集群所属云provider
          in: query
          required: false
          schema:
            type: string
      tags:
        - ClusterManager
    delete:
      summary: 删除ClusterAutoScalingOption
      description: 删除指定集群的ClusterAutoScalingOption
      operationId: ClusterManager_DeleteAutoScalingOption
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerDeleteAutoScalingOptionResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      parameters:
        - name: clusterID
          description: BCS集群ID
          in: path
          required: true
          schema:
            type: string
        - name: isForce
          description: isForce.
            强制删除AutoScalingOption信息，即使未正常执行完成，也会进入终止。对于自定义cluster-autoscaler安装的场景下，是需要清理已部署的CA模块。
          in: query
          required: false
          schema:
            type: boolean
      tags:
        - ClusterManager
    put:
      summary: 更新ClusterAutoScalingOption, 该接口为全量更新
      description: 更新ClusterAutoscalingOption，一个ClusterAutoScalingOption对应一个集群，索引信息为clusterID
      operationId: ClusterManager_UpdateAutoScalingOption
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerUpdateAutoScalingOptionResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      parameters:
        - name: clusterID
          description: BCS集群ID，关联的集群ID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/clustermanagerUpdateAutoScalingOptionRequest"
        required: true
      tags:
        - ClusterManager
  "/clustermanager/v1/autoscalingoption/{clusterID}/providers/{provider}":
    put:
      summary: 更新ClusterAutoscalingOption使用的资源池，主要应用于自研云便于产品记忆上次用户使用的资源池
      description: 更新ClusterAutoscalingOption使用的资源池，主要应用于自研云便于产品记忆上次用户使用的资源池
      operationId: ClusterManager_UpdateAsOptionDeviceProvider
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerUpdateAsOptionDeviceProviderResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      parameters:
        - name: clusterID
          description: BCS集群ID，关联的集群ID
          in: path
          required: true
          schema:
            type: string
        - name: provider
          description: 集群创建节点池使用的资源池类型(目前仅支持yunti、self资源池类型，默认为yunti资源池)
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/clustermanagerUpdateAsOptionDeviceProviderRequest"
        required: true
      tags:
        - ClusterManager
  "/clustermanager/v1/autoscalingoption/{clusterID}/status":
    put:
      summary: 开启/关闭集群弹性扩缩容
      description: 开启/关闭集群弹性扩缩容
      operationId: ClusterManager_UpdateAutoScalingStatus
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerUpdateAutoScalingStatusResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      parameters:
        - name: clusterID
          description: BCS集群ID，关联的集群ID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/clustermanagerUpdateAutoScalingStatusRequest"
        required: true
      tags:
        - ClusterManager
  "/clustermanager/v1/autoscalingoption/{clusterID}/sync":
    put:
      summary: CA集群实际参数同步至管控端
      description: CA集群实际参数同步至管控端
      operationId: ClusterManager_SyncAutoScalingOption
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerSyncAutoScalingOptionResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      parameters:
        - name: clusterID
          description: BCS集群ID，关联的集群ID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/clustermanagerSyncAutoScalingOptionRequest"
        required: true
      tags:
        - ClusterManager
  "/clustermanager/v1/bksops/business/{businessID}/templates":
    get:
      summary: 查询标准运维任务的模板列表
      description: 查询用户有权限的业务下标准运维任务的模板列表
      operationId: ClusterManager_GetBkSopsTemplateList
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerGetBkSopsTemplateListResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      parameters:
        - name: businessID
          description: 业务ID
          in: path
          required: true
          schema:
            type: string
        - name: operator
          description: operator. 该用户在当前业务下有权限的模板列表
          in: query
          required: false
          schema:
            type: string
        - name: templateSource
          description: templateSource. 模板来源, business或者common表示项目流程或是公共流程
          in: query
          required: false
          schema:
            type: string
        - name: scope
          description: scope. bk_biz_id 检索的作用域. 默认为cmdb_biz,此时检索的是绑定的 CMDB 业务 ID 为
            bk_biz_id 的项目,当值为 project 时则检索项目 ID 为 bk_biz_id 的项目
          in: query
          required: false
          schema:
            type: string
      tags:
        - ClusterManager
  "/clustermanager/v1/bksops/business/{businessID}/templates/{templateID}":
    get:
      summary: 查询标准运维任务的模板列表
      description: 查询用户有权限的业务下标准运维任务的模板列表
      operationId: ClusterManager_GetBkSopsTemplateInfo
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerGetBkSopsTemplateInfoResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      parameters:
        - name: businessID
          description: 业务ID
          in: path
          required: true
          schema:
            type: string
        - name: templateID
          description: 模板ID
          in: path
          required: true
          schema:
            type: string
        - name: operator
          description: operator. 该用户在当前业务下有权限的模板列表
          in: query
          required: false
          schema:
            type: string
        - name: templateSource
          description: templateSource. 模板来源, business或者common表示项目流程或是公共流程
          in: query
          required: false
          schema:
            type: string
        - name: scope
          description: scope. bk_biz_id 检索的作用域. 默认为cmdb_biz,此时检索的是绑定的 CMDB 业务 ID 为
            bk_biz_id 的项目,当值为 project 时则检索项目 ID 为 bk_biz_id 的项目
          in: query
          required: false
          schema:
            type: string
      tags:
        - ClusterManager
  /clustermanager/v1/bksops/debug:
    post:
      summary: 调试标准运维任务
      description: 调试标准运维任务
      operationId: ClusterManager_DebugBkSopsTask
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerDebugBkSopsTaskResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/clustermanagerDebugBkSopsTaskRequest"
        required: true
      tags:
        - ClusterManager
  /clustermanager/v1/bksops/templatevalues:
    get:
      summary: 查询BCS平台内置的模板变量
      description: 查询BCS平台内置的模板变量,用于渲染用户的标准运维任务参数
      operationId: ClusterManager_GetInnerTemplateValues
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerGetInnerTemplateValuesResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      parameters:
        - name: clusterID
          description: clusterID. 集群ID
          in: query
          required: false
          schema:
            type: string
        - name: operator
          description: operator. 操作用户
          in: query
          required: false
          schema:
            type: string
      tags:
        - ClusterManager
  "/clustermanager/v1/business/{businessID}/clusters":
    get:
      summary: 查询某个业务下的Cluster列表
      description: 查询业务下的集群列表信息(目前仅支持业务ID)
      operationId: ClusterManager_ListBusinessCluster
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerListBusinessClusterResp"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      parameters:
        - name: businessID
          description: 业务ID
          in: path
          required: true
          schema:
            type: string
        - name: operator
          description: operator. 操作者(传参时获取该用户对应集群的权限信息,不传时仅获取集群列表信息)
          in: query
          required: false
          schema:
            type: string
      tags:
        - ClusterManager
  /clustermanager/v1/cloud:
    get:
      summary: 查询Cloud列表
      description: 根据查询条件过滤Cloud列表，如果某项条件值为空，则忽略此条件。如果所有条件都为空，则默认查询所有集群
      operationId: ClusterManager_ListCloud
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerListCloudResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      parameters:
        - name: cloudID
          description: cloudID. 云类型，英文字符串
          in: query
          required: false
          schema:
            type: string
        - name: name
          description: name. 云类型中文名称
          in: query
          required: false
          schema:
            type: string
        - name: editable
          description: editable. 对于SaaS层面该信息是否可编辑，BCS默认提供的预定义信息不可编译
          in: query
          required: false
          schema:
            type: boolean
        - name: creator
          description: creator. 创建者
          in: query
          required: false
          schema:
            type: string
        - name: updater
          description: updater. 更新者
          in: query
          required: false
          schema:
            type: string
        - name: cloudProvider
          description: cloudProvider. 特性实现模式
          in: query
          required: false
          schema:
            type: string
        - name: businessID
          description: businessID. 业务ID
          in: query
          required: false
          schema:
            type: string
      tags:
        - ClusterManager
    post:
      summary: 创建云模板
      description: 创建云模板管理信息
      operationId: ClusterManager_CreateCloud
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerCreateCloudResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/clustermanagerCreateCloudRequest"
        required: true
      tags:
        - ClusterManager
  /clustermanager/v1/cloud/kubeConfig:
    put:
      summary: kubeConfig可用性检测
      description: kubeConfig连接集群可用性检测
      operationId: ClusterManager_CheckCloudKubeConfig
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerKubeConfigResp"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/clustermanagerKubeConfigReq"
        required: true
      tags:
        - ClusterManager
  "/clustermanager/v1/cloud/{cloudID}":
    get:
      summary: 查询Cloud
      description: 查询指定cloudID模板信息
      operationId: ClusterManager_GetCloud
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerGetCloudResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      parameters:
        - name: cloudID
          description: 云模板ID
          in: path
          required: true
          schema:
            type: string
        - name: businessID
          description: businessID. 业务ID
          in: query
          required: false
          schema:
            type: string
      tags:
        - ClusterManager
    delete:
      summary: 删除Cloud模板
      description: 删除特定cloud模板信息
      operationId: ClusterManager_DeleteCloud
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerDeleteCloudResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      parameters:
        - name: cloudID
          description: 云类型，英文字符串
          in: path
          required: true
          schema:
            type: string
        - name: isForce
          in: query
          required: false
          schema:
            type: boolean
      tags:
        - ClusterManager
    put:
      summary: 更新云模板
      description: 更新云模板信息
      operationId: ClusterManager_UpdateCloud
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerUpdateCloudResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      parameters:
        - name: cloudID
          description: 云类型，英文字符串
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/clustermanagerUpdateCloudRequest"
        required: true
      tags:
        - ClusterManager
  "/clustermanager/v1/cloud/{cloudID}/recommendNodeGroupConf":
    get:
      summary: 创建集群时推荐的节点池配置
      description: 创建集群时推荐的节点池配置
      operationId: ClusterManager_RecommendNodeGroupConf
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerRecommendNodeGroupConfResp"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      parameters:
        - name: cloudID
          description: 云模版ID, 集群所属云进行流程管理
          in: path
          required: true
          schema:
            type: string
        - name: accountID
          description: accountID. 导入集群关联的cloud凭证信息, 可以为空; 当为空时, 可以通过cloud获取cloud凭证信息
          in: query
          required: false
          schema:
            type: string
        - name: region
          description: region. 集群所在地域
          in: query
          required: false
          schema:
            type: string
        - name: resourceGroupName
          description: resourceGroupName. AKS集群所属resource group
          in: query
          required: false
          schema:
            type: string
      tags:
        - ClusterManager
  "/clustermanager/v1/cloudregion/{cloudID}":
    get:
      summary: 查询Cloud region列表
      description: 根据cloudID获取所属cloud的地域信息
      operationId: ClusterManager_ListCloudRegions
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerListCloudRegionsResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      parameters:
        - name: cloudID
          description: 云类型，英文字符串
          in: path
          required: true
          schema:
            type: string
      tags:
        - ClusterManager
  "/clustermanager/v1/clouds/{cloudID}/accounts":
    get:
      summary: 查询Cloud 账号列表
      description: 根据查询条件过滤Cloud 账号列表，如果某项条件值为空，则忽略此条件。如果所有条件都为空，则默认查询所有账号
      operationId: ClusterManager_ListCloudAccount
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerListCloudAccountResponse"
        default:
          description: An unexpected error response.
          content:
