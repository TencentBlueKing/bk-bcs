          title: defaultCooldown
        subnetIDs:
          type: array
          items:
            type: string
          description: 弹性伸缩组扩容实例首选的的子网ID，多个子网ID按照先后顺序确认优先级，靠前优先级高
          title: subnetIDs
        zones:
          type: array
          items:
            type: string
          description: 弹性伸缩组扩容实例首选的可用区ID，多个可用区按照先后顺序确认优先级，靠前优先级高
          title: zones
        retryPolicy:
          type: string
          description: 创建实例失败时的重试策略：IMMEDIATE_RETRY(最大5次)，INCREMENTAL_INTERVALS，NO_RETRY。默认值为IMMEDIATE_RETRY。扩容时默认会组合subnet和zone信息逐一尝试实例创建直到最大失败次数或者所有组合全失败。
          title: retryPolicy
        multiZoneSubnetPolicy:
          type: string
          description: 可选值：PRIORITY，EQUALITY。PRIORITY：默认在高优先级的子网与可用区创建实例。EQUALITY：所有可用区、子网机会均衡
          title: multiZoneSubnetPolicy
        replaceUnhealthy:
          type: boolean
          description: 开启监控不健康节点替换服务，默认false。连续1分钟ping不通则视为不健康！
          title: replaceUnhealthy
        scalingMode:
          type: string
          description: 扩容模式，CLASSIC_SCALING(默认)：扩容时创建新实例，缩容时销毁实例；WAKE_UP_STOPPED_SCALING：缩容时关机不销毁，扩容时优先唤醒关机实例。
          title: scalingMode
