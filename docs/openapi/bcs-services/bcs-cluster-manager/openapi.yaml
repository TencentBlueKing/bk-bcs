      summary: 查询Cluster
      description: 查询指定ClusterID的集群信息
      operationId: ClusterManager_GetCluster
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerGetClusterResp"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      parameters:
        - name: clusterID
          description: 集群ID
          in: path
          required: true
          schema:
            type: string
        - name: cloudInfo
          description: cloudInfo. 集群关联的云集群信息, 默认从数据库获取数据
          in: query
          required: false
          schema:
            type: boolean
        - name: projectId
          description: projectId. 共享集群在自身项目下应该标识为独立集群处理
          in: query
          required: false
          schema:
            type: string
      tags:
        - ClusterManager
    delete:
      summary: 删除Cluster
      description: 删除特定Cluster
      operationId: ClusterManager_DeleteCluster
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerDeleteClusterResp"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      parameters:
        - name: clusterID
          description: 集群ID
          in: path
          required: true
          schema:
            type: string
        - name: isForced
          description: isForced.
            是否强制删除，默认false。强制删除会一并删除clustermanager管理的资源，例如节点，节点池等。强制删除周期较长，清理工作会进入长后台任务运行，集群信息不会立刻被清空，而是处于删除状态。
          in: query
          required: false
          schema:
            type: boolean
        - name: instanceDeleteMode
          description: "instanceDeleteMode. 集群实例删除时策略: terminate(销毁实例) retain(仅移除,保留实例)。"
          in: query
          required: false
          schema:
            type: string
        - name: onlyDeleteInfo
          description: onlyDeleteInfo.
            默认为false。设置为true时，仅删除cluster-manager所记录的信息，不会触发任何自动化流程。该参数可以与isForced同时协同工作。
          in: query
          required: false
          schema:
            type: boolean
        - name: operator
          description: operator. 删除集群操作人
          in: query
          required: false
          schema:
            type: string
        - name: deleteClusterRecord
          description: deleteClusterRecord. 管理员操作, 设置true时仅删除集群数据库记录
          in: query
          required: false
          schema:
            type: boolean
      tags:
        - ClusterManager
    put:
      summary: 更新Cluster
      description: 更新Cluster信息，该接口仅用于更新信息，不会触发任何集群管理的自动化动作。
      operationId: ClusterManager_UpdateCluster
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerUpdateClusterResp"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      parameters:
        - name: clusterID
          description: 集群ID，例如BCS-K8S-000000
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/clustermanagerUpdateClusterReq"
        required: true
      tags:
        - ClusterManager
