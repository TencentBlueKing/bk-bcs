          description: NodeGroup ID，自建ID或者云设施ID
          in: path
          required: true
          schema:
            type: string
      tags:
        - ClusterManager
    delete:
      summary: 删除NodeGroup
      description: 删除特定NodeGroup。当NodeGroup有留存的Node时，不允许直接删除。如果要删除有Node的节点组，请设置强制删除条件。
      operationId: ClusterManager_DeleteNodeGroup
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerDeleteNodeGroupResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      parameters:
        - name: nodeGroupID
          description: 节点组ID
          in: path
          required: true
          schema:
            type: string
        - name: isForce
          description: isForce. 强制删除，包括清理节点池管理的机器。外部资源删除转入后台删除长任务对列，默认会返回Task信息方便确认进度。
          in: query
          required: false
          schema:
            type: boolean
        - name: reserveNodesInCluster
          description: reserveNodesInCluster. 保留节点在集群中，仅删除节点池，解除节点与节点池关联。当且仅当强制删除时生效。
          in: query
          required: false
          schema:
            type: boolean
        - name: keepNodesInstance
          description: keepNodesInstance. 节点从集群移除，清理资源，但不销毁机器，保留机器运行。当且仅当强制删除时生效。
          in: query
          required: false
          schema:
            type: boolean
        - name: operator
          description: operator. 操作者
          in: query
          required: false
          schema:
            type: string
        - name: onlyDeleteInfo
          description: onlyDeleteInfo. onlyDeleteInfo仅删除数据,不执行流程
          in: query
          required: false
          schema:
            type: boolean
      tags:
        - ClusterManager
    put:
      summary: 更新NodeGroup
      description: 更新NodeGroup信息
      operationId: ClusterManager_UpdateNodeGroup
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
