            r。value为各模块进程启动参数，多个参数之间使用;间隔，例如Etcd:
            node-data-dir=/data/bcs/lib/etcd;"
          title: extraArgs
        networkType:
          type: string
          description: 集群网络类型（包括GR(全局路由)和VPC-CNI两种模式，默认为GR.也支持CiliumOverlay模式（(flannel、calico、或者云上自研网络插件等)）
          title: networkType
        deletionProtection:
          type: boolean
          description: 是否启用集群删除保护
          title: deletionProtection
        auditEnabled:
          type: boolean
          description: 是否开启审计开关
          title: auditEnabled
        enableHa:
          type: boolean
          description: 自建集群是否开启高可用
          title: enableHa
        clusterConnectSetting:
          $ref: "#/components/schemas/clustermanagerClusterConnectSetting"
    clustermanagerClusterAutoScalingOption:
      type: object
      properties:
        isScaleDownEnable:
          type: boolean
          description: scale-down-enabled,是否允许缩容节点
          title: isScaleDownEnable
        expander:
          type: string
          description: expander,扩容算法，（默认）random, least-waste, most-pods, priority
          title: expander
        maxEmptyBulkDelete:
          type: integer
          format: int64
          description: max-empty-bulk-delete,单次缩容最大节点数
          title: maxEmptyBulkDelete
        scaleDownDelay:
          type: integer
          format: int64
          description: 集群扩容后多长时间开始判定缩容，默认10分钟
          title: scaleDownDelay
        scaleDownUnneededTime:
          type: integer
          format: int64
          description: scale-down-unneeded-time,执行缩容等待时间，节点连续空闲多少分钟后被缩容，默认10分钟
          title: scaleDownUnneededTime
        scaleDownUtilizationThreahold:
          type: integer
          format: int64
          description: scale-down-utilization-threshold,触发缩容资源阈值，节点资源使用量低于多少百分比判定为空闲，默认为50
          title: scaleDownUtilizationThreahold
        skipNodesWithLocalStorage:
          type: boolean
          description: 忽略有本地存储的节点，默认为false
          title: skipNodesWithLocalStorage
        skipNodesWithSystemPods:
          type: boolean
          description: 忽略kube-system NS下非DaemonSet管理的Pod的节点，默认false
          title: skipNodesWithSystemPods
        ignoreDaemonSetsUtilization:
          type: boolean
          description: 忽略DaemonSet的资源计算
          title: ignoreDaemonSetsUtilization
        okTotalUnreadyCount:
          type: integer
          format: int64
          description: ok-total-unready-count,允许 unready 节点的数量
          title: okTotalUnreadyCount
        maxTotalUnreadyPercentage:
          type: integer
          format: int64
          description: max-total-unready-percentage,unready节点超过集群总节点的百分比，超过此阈值则停止自动扩容
          title: maxTotalUnreadyPercentage
        scaleDownUnreadyTime:
          type: integer
          format: int64
          description: scale-down-unready-time,unready节点缩容等待时间，单位秒
          title: scaleDownUnreadyTime
        unregisteredNodeRemovalTime:
          type: integer
          format: int64
          description: cluster-autoscaler等待多长时间将删除未在kubernetes中注册的节点，默认30分钟，暂时没使用
          title: unregisteredNodeRemovalTime
        projectID:
          type: string
          description: 项目ID，关联的项目信息
          title: projectID
        clusterID:
          type: string
          description: BCS集群ID，关联的集群ID
          title: clusterID
        creator:
          type: string
          description: 信息创建者
          title: creator
        createTime:
          type: string
          description: 信息创建时间
          title: createTime
        updater:
          type: string
          description: 信息更新者
          title: updater
        updateTime:
          type: string
          description: 信息更新时间
          title: updateTime
        provider:
          type: string
          description: ClusterAutoScaling具体实现，用于覆盖所属cluster中定义的provider信息调整实现的细节。便于在一个云环境中扩展自定义的模板，使用不同
          title: provider
        enableAutoscale:
          type: boolean
          description: 是否开启自动扩缩容，开启后会在该集群部署 ClusterAutoScaling 组件，默认为 false
          title: enableAutoscale
        bufferResourceRatio:
          type: integer
          format: int64
          description: buffer-resource-ratio,触发扩容资源阈值百分比，集群资源使用率超过该值，则触发扩容，默认 100
          title: bufferResourceRatio
        maxGracefulTerminationSec:
          type: integer
          format: int64
          description: max-graceful-termination-sec,缩容时，等待 Pod 退出最长时间
          title: maxGracefulTerminationSec
        scanInterval:
          type: integer
          format: int64
          description: scan-interval,自动扩缩容检测时间间隔，单位为秒，默认为 10
          title: scanInterval
        maxNodeProvisionTime:
          type: integer
          format: int64
          description: max-node-provision-time,等待节点提供最长时间，单位秒，默认 900
          title: maxNodeProvisionTime
        scaleUpFromZero:
          type: boolean
          description: scale-up-from-zero,允许自动扩容（没有 ready 节点时）
          title: scaleUpFromZero
        scaleDownDelayAfterAdd:
          type: integer
          format: int64
          description: scale-down-delay-after-add,扩容后判断缩容时间间隔，单位秒
          title: scaleDownDelayAfterAdd
        scaleDownDelayAfterDelete:
          type: integer
          format: int64
          description: scale-down-delay-after-delete,连续两次缩容时间间隔，单位秒
          title: scaleDownDelayAfterDelete
        scaleDownDelayAfterFailure:
          type: integer
          format: int64
          description: scale-down-delay-after-failure,缩容失败后重试时间间隔，单位秒
          title: scaleDownDelayAfterFailure
        scaleDownGpuUtilizationThreshold:
          type: integer
          format: int64
          description: scale-down-gpu-utilization-threshold,触发缩容资源阈值(GPU)，节点资源使用量低于多少百分比判定为空闲，默认为50
          title: scaleDownGpuUtilizationThreshold
        status:
          type: string
          description: 状态, NORMAL:正常，UPDATING:更新中，UPDATE-FAILED:更新失败，STOPPED:已停止
          title: status
        errorMessage:
          type: string
          description: 错误信息
          title: errorMessage
        bufferResourceCpuRatio:
          type: integer
          format: int64
