      operationId: ClusterManager_ListClusterV2
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clustermanagerListClusterV2Resp"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/runtimeError"
      parameters:
        - name: projectID
          description: projectID. 项目ID
          in: query
          required: false
          schema:
            type: string
        - name: businessID
          description: businessID. CMDB业务ID
          in: query
          required: false
          schema:
            type: string
        - name: provider
          description: provider. 集群提供者，云模板ID，影响具体云设施管理流程
          in: query
          required: false
          schema:
            type: string
        - name: region
          description: region. 集群所在地域
          in: query
          required: false
          schema:
            type: string
        - name: vpcID
          description: vpcID. 集群私有网络id，云上集群填写
          in: query
          required: false
          schema:
            type: string
        - name: environment
          description: environment. 集群环境, 例如[prod, debug, test]
          in: query
          required: false
          schema:
            type: string
        - name: engineType
          description: engineType. 引擎类型，[k8s, mesos]，默认k8s
          in: query
          required: false
          schema:
            type: string
        - name: clusterType
          description: clusterType. 集群类型, 例如[federation, single],
            federation表示为联邦集群，single表示独立集群，默认为single
          in: query
          required: false
          schema:
            type: string
        - name: status
          description: status.
            集群状态，可能状态CREATING，RUNNING，DELETING，FALURE，INITIALIZATION，DELETED
          in: query
          required: false
          schema:
            type: string
        - name: systemID
          description: systemID. cloudID过滤集群
          in: query
          required: false
          schema:
            type: string
        - name: isCommonCluster
          description: isCommonCluster. 是否为公共集群,默认false
          in: query
          required: false
          schema:
            type: boolean
        - name: clusterID
          description: clusterID. 集群ID
          in: query
          required: false
          schema:
            type: string
        - name: all
          description: all. true时获取所有的集群信息,包括被软删除的集群; false时获取非DELETED状态的集群信息
          in: query
          required: false
          schema:
            type: boolean
        - name: offset
          description: offset. 查询偏移量
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: limit
          description: limit. 查询限制数量
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: clusterName
          description: clusterName. 集群名称
          in: query
          required: false
          schema:
            type: string
        - name: sort
          description: sort. 根据某个字段排序
          in: query
          required: false
          schema:
            type: string
        - name: order
          description: order. 升序或者降序
          in: query
          required: false
          schema:
            type: string
      tags:
        - ClusterManager
