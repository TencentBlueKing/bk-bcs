            type: string
          description: 扩容的集群节点IP地址
          title: nodes
        initLoginPassword:
          type: string
          description: 重装时的初始密码, 可为空
          title: initLoginPassword
        nodeGroupID:
          type: string
          description: 扩容节点如果需要加入NodeGroup，需要填写关联ID
          title: nodeGroupID
        onlyCreateInfo:
          type: boolean
          description: 仅写入节点信息，默认是false。仅写入节点信息时，会通过cluster所属cloudprovider查询节点信息，并设置为RUNNING。
          title: onlyCreateInfo
        operator:
          type: string
          description: 操作者
          title: operator
        nodeTemplateID:
          type: string
          description: 关联的节点模板ID
          title: nodeTemplateID
        isExternalNode:
          type: boolean
          description: 上架第三方节点需置为true, 且必须关联nodeGroupID
          title: 是否是第三方节点(IDC节点)
        login:
          $ref: "#/components/schemas/clustermanagerNodeLoginInfo"
        advance:
          $ref: "#/components/schemas/clustermanagerNodeAdvancedInfo"
      description: 给指定的集群进行扩容，！注意！扩容的机器如果是腾讯云cvm默认会重装系统，不能使用竞价计费类型的机器
      title: AddNodesRequestV2
      required:
        - clusterID
        - nodes
    clustermanagerAddNodesV2Response:
      type: object
      properties:
        code:
          type: integer
          format: int64
          description: 返回错误码
          title: code
        message:
          type: string
          description: 返回错误信息
          title: message
        result:
          type: boolean
          description: 返回结果
          title: result
        data:
          type: array
          items:
            $ref: "#/components/schemas/clustermanagerTask"
          description: 节点添加任务信息
          title: data
        web_annotations:
          $ref: "#/components/schemas/clustermanagerWebAnnotationsV2"
      description: 增加集群节点返回，主要是反馈相关自动化过程的任务信息，便于查阅状态，V2版本返回任务列表
      title: AddNodesResponseV2
      required:
        - code
        - data
    clustermanagerAddSubnetToClusterReq:
