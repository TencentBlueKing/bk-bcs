          description: 返回错误信息
          title: message
        result:
          type: boolean
          description: 返回结果
          title: result
        data:
          $ref: "#/components/schemas/clustermanagerTask"
        web_annotations:
          $ref: "#/components/schemas/clustermanagerWebAnnotationsV2"
      description: 增加集群节点返回，主要是反馈相关自动化过程的任务信息，便于查阅状态
