      summary: 回收节点组中的节点，使用query参数指定需要清理的节点
      description: 指定IP地址从节点组中移除，也从集群中移除，并清理资源回收节点。该接口为异步接口，当该接口正常返回时，仅能确认清理任务正常创建，不能保证节点清理已经完成，如果需要确认进度，需要通过返回的Task进行详细查询。
      operationId: ClusterManager_CleanNodesInGroupV2
      responses:
