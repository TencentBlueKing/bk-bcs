    clustermanagerSyncAutoScalingOptionRequest:
      type: object
      properties:
        isScaleDownEnable:
          type: boolean
          description: scale-down-enabled,是否允许缩容节点
          title: isScaleDownEnable
        expander:
          type: string
          description: expander,扩容算法，（默认）random, least-waste, most-pods, priority
          title: expander
        maxEmptyBulkDelete:
          type: integer
          format: int64
          description: max-empty-bulk-delete,单次缩容最大节点数; CA并发缩容节点
          title: maxEmptyBulkDelete
        scaleDownDelay:
          type: integer
          format: int64
          description: 集群扩容后多长时间开始判定缩容，默认10分钟；无效参数
          title: scaleDownDelay
        scaleDownUnneededTime:
          type: integer
          format: int64
          description: scale-down-unneeded-time,执行缩容等待时间，节点连续空闲多少分钟后被缩容，默认10分钟
          title: scaleDownUnneededTime
        scaleDownUtilizationThreahold:
          type: integer
          format: int64
          description: scale-down-utilization-threshold,触发缩容资源阈值，节点资源使用量低于多少百分比判定为空闲，默认为50
          title: scaleDownUtilizationThreahold
        skipNodesWithLocalStorage:
          type: boolean
          description: 忽略有本地存储的节点，默认为true
          title: skipNodesWithLocalStorage
        skipNodesWithSystemPods:
          type: boolean
          description: 忽略kube-system NS下非DaemonSet管理的Pod的节点，默认true
          title: skipNodesWithSystemPods
        ignoreDaemonSetsUtilization:
          type: boolean
          description: 忽略DaemonSet的资源计算, 默认为true
          title: ignoreDaemonSetsUtilization
        okTotalUnreadyCount:
          type: integer
          format: int64
          description: ok-total-unready-count,允许 unready 节点的数量
          title: okTotalUnreadyCount
        maxTotalUnreadyPercentage:
          type: integer
          format: int64
          description: max-total-unready-percentage,unready节点超过集群总节点的百分比，超过此阈值则停止自动扩容
          title: maxTotalUnreadyPercentage
        scaleDownUnreadyTime:
          type: integer
          format: int64
          description: scale-down-unready-time,unready节点缩容等待时间，单位秒
          title: scaleDownUnreadyTime
        clusterID:
          type: string
          description: BCS集群ID，关联的集群ID
          title: clusterID
        updater:
          type: string
          description: 更新人
          title: updater
        scaleDownGpuUtilizationThreshold:
          type: integer
          format: int64
          description: scale-down-gpu-utilization-threshold,触发缩容资源阈值(GPU)，节点资源使用量低于多少百分比判定为空闲，默认为50
          title: scaleDownGpuUtilizationThreshold
        bufferResourceRatio:
          type: integer
          format: int64
          description: buffer-resource-ratio,触发扩容资源阈值百分比，集群资源使用率超过该值，则触发扩容，默认 100
          title: bufferResourceRatio
        maxGracefulTerminationSec:
          type: integer
          format: int64
          description: max-graceful-termination-sec,缩容时等待 Pod 退出最长时间
          title: maxGracefulTerminationSec
        scanInterval:
          type: integer
          format: int64
          description: scan-interval,自动扩缩容检测时间间隔，单位为秒，默认为 10
          title: scanInterval
        maxNodeProvisionTime:
          type: integer
          format: int64
          description: max-node-provision-time,等待节点提供最长时间，单位秒，默认 900
          title: maxNodeProvisionTime
        maxNodeStartupTime:
          type: integer
          format: int64
          description: max-node-startup-time,等待变为ready的最长时间，单位秒，默认 900
          title: maxNodeStartupTime
        maxNodeStartScheduleTime:
          type: integer
          format: int64
          description: max-node-start-schedule-time,等待节点变为可调度的最长时间，单位秒，默认 900
          title: maxNodeStartScheduleTime
        scaleUpFromZero:
          type: boolean
          description: scale-up-from-zero,允许自动扩容（没有 ready 节点时）
          title: scaleUpFromZero
        scaleDownDelayAfterAdd:
          type: integer
          format: int64
          description: scale-down-delay-after-add,扩容后判断缩容时间间隔，单位秒
          title: scaleDownDelayAfterAdd
        scaleDownDelayAfterDelete:
          type: integer
          format: int64
          description: scale-down-delay-after-delete,连续两次缩容时间间隔，单位秒
          title: scaleDownDelayAfterDelete
        scaleDownDelayAfterFailure:
          type: integer
          format: int64
          description: scale-down-delay-after-failure,缩容失败后重试时间间隔，单位秒
          title: scaleDownDelayAfterFailure
        bufferResourceCpuRatio:
          type: integer
          format: int64
          description: bufferResourceCpuRatio,触发扩容资源阈值百分比，集群cpu资源使用率超过该值，则触发扩容，默认 100
          title: bufferResourceCpuRatio
        bufferResourceMemRatio:
          type: integer
          format: int64
          description: bufferResourceMemRatio,触发扩容资源阈值百分比，集群mem资源使用率超过该值，则触发扩容，默认 100
          title: bufferResourceMemRatio
        webhook:
          $ref: "#/components/schemas/clustermanagerWebhookMode"
        expendablePodsPriorityCutoff:
          type: integer
          format: int32
          description: 优先级低于此值的 pod，pending 不会触发扩容，缩容时会直接 kill, 默认值-10
          title: expendablePodsPriorityCutoff
        newPodScaleUpDelay:
          type: integer
          format: int64
          description: newPodScaleUpDelay，新pod建立多久之后才触发CA, 默认 0
          title: newPodScaleUpDelay
      description: 同步AutoScalingOption参数
      title: SyncAutoScalingOptionRequest
      required:
        - clusterID
        - updater
