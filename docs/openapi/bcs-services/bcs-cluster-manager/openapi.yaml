          description: clusterID. 集群ID
          in: query
          required: false
          schema:
            type: string
        - name: nodes
          description: nodes. 需要清理回收的IP列表，使用','分割
          in: query
          required: false
          schema:
            type: string
        - name: operator
          description: operator. 操作者
          in: query
          required: false
          schema:
            type: string
