security:
  - ApiKeyAuth: []
servers:
  - url: /bcsapi/v4
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      name: Authorization
      in: header
  schemas:
    clustermanagerAccount:
      type: object
      properties:
        secretID:
          type: string
          description: 腾讯云账号secretID
          title: secretID
        secretKey:
          type: string
          description: 腾讯云账号secretKey
          title: secretKey
        subscriptionID:
          type: string
          description: Azure 订阅ID
          title: subscriptionID
        tenantID:
          type: string
          description: Azure 租户ID
          title: tenantID
        resourceGroupName:
          type: string
          description: Azure 资源组名称
          title: resourceGroupName
        clientID:
          type: string
          description: Azure Service Principal ClientID
          title: clientID
        clientSecret:
          type: string
          description: Azure Service Principal ClientSecret
          title: clientSecret
        serviceAccountSecret:
          type: string
          description: Google Cloud service account的json字符串秘钥
          title: serviceAccountSecret
        gkeProjectID:
          type: string
          description: Google Cloud 项目ID
          title: gkeProjectID
      description: 用于存储不同cloud的账号信息，不同cloud格式兼容处理
      title: Account
    clustermanagerAction:
      type: object
      properties:
        preActions:
          type: array
          items:
            type: string
          description: 行为前置自动化模板列表，action在操作行为前置执行
          title: preActions
        postActions:
          type: array
          items:
            type: string
          description: 行为后置自动化模板列表，action在操作行为后置执行
          title: preActions
        plugins:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/clustermanagerBKOpsPlugin"
          description: 具体行为流程动作定义
          title: plugins
      description: 记录各模块功能自动化行为模板, 对接job系统, 完成自定义操作;
        针对不同云的不同操作模版参数需自定义针对大部分操作，仅需要前置动作或后置动作即可. 可自由扩展
      title: Action
    clustermanagerAddFederatedClusterReq:
      type: object
      properties:
        federationClusterID:
          type: string
          description: 联邦集群ID
          title: federationClusterID
        clusterID:
          type: string
          description: 底层集群ID
          title: clusterID
      description: 将集群加入联邦集群的请求
      title: AddFederatedClusterReq
      required:
        - federationClusterID
        - clusterID
    clustermanagerAddFederatedClusterResp:
      type: object
      properties:
        code:
          type: integer
          format: int64
          description: 返回错误码
          title: code
        message:
          type: string
          description: 返回错误信息
          title: message
        result:
          type: boolean
          description: 返回结果
          title: result
      description: 将集群加入联邦集群的请求返回
      title: AddFederatedClusterResp
      required:
        - code
        - message
        - data
    clustermanagerAddNodesRequest:
      type: object
      properties:
        clusterID:
          type: string
          description: 扩容的集群ID
          title: clusterID
        nodes:
          type: array
          items:
            type: string
          description: 扩容的集群节点IP地址
          title: nodes
        initLoginPassword:
          type: string
          description: 重装时的初始密码, 可为空
          title: initLoginPassword
        nodeGroupID:
          type: string
          description: 扩容节点如果需要加入NodeGroup，需要填写关联ID
          title: nodeGroupID
        onlyCreateInfo:
          type: boolean
          description: 仅写入节点信息，默认是false。仅写入节点信息时，会通过cluster所属cloudprovider查询节点信息，并设置为RUNNING。
          title: onlyCreateInfo
        operator:
          type: string
          description: 操作者
          title: operator
        nodeTemplateID:
          type: string
          description: 关联的节点模板ID
          title: nodeTemplateID
        isExternalNode:
          type: boolean
          description: 上架第三方节点需置为true, 且必须关联nodeGroupID
          title: 是否是第三方节点(IDC节点)
