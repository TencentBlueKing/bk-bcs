  /namespaces/:namespace/pods/network_receive:
    post:
      tags:
        - Metrics
      summary: 网络接收量
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
  /namespaces/:namespace/pods/network_transmit:
    post:
      tags:
        - Metrics
      summary: Pod 网络发送量
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
  /namespaces/namespace/pods/:pod/containers/:container/cpu_limit:
    get:
      tags:
        - Metrics
      summary: 容器 CPU 限制
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
  /namespaces/namespace/pods/:pod/containers/:container/cpu_usage:
    get:
      tags:
        - Metrics
