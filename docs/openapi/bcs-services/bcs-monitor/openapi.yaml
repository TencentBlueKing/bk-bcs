openapi: 3.0.0
info:
  title: BCS-Monitor OpenAPI
  contact: {}
  version: ""
paths:
  /cpu_request_usage:
    get:
      tags:
        - Metrics
      summary: 集群 CPU 装箱率
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
  /cpu_usage:
    get:
      tags:
        - Metrics
      summary: 集群 CPU 使用率
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
  /disk_usage:
    get:
      tags:
        - Metrics
      summary: 集群磁盘使用率
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
  /diskio_usage:
    get:
      tags:
        - Metrics
      summary: 集群磁盘IO使用率
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
  /event_data_id:
    get:
      tags:
        - Metrics
      summary: 获取集群事件数据ID
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
  /group/:group/max_node_num:
    get:
      tags:
        - Metrics
      summary: 集群最大节点池数目
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
  /group/:group/node_num:
    get:
      tags:
        - Metrics
      summary: 集群节点池数目
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
  /log_collector/entrypoints:
    post:
      tags:
        - LogCollectors
      summary: 获取容器日志查询入口
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: "#/components/schemas/pkg_api_logrule.Entrypoint"
  /log_collector/rules:
    get:
      tags:
        - LogCollectors
      summary: 获取日志采集规则列表
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/pkg_api_logrule.GetLogRuleResp"
    post:
      tags:
        - LogCollectors
      summary: 创建日志采集规则
      responses:
        "200":
          description: OK
  /log_collector/rules/:id:
    get:
      tags:
        - LogCollectors
      summary: 获取日志采集规则详情
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pkg_api_logrule.GetLogRuleResp"
    put:
      tags:
        - LogCollectors
      summary: 更新日志采集规则
      responses:
        "200":
          description: OK
    delete:
      tags:
        - LogCollectors
      summary: 删除日志采集规则
      responses:
        "200":
          description: OK
  /log_collector/rules/:id/disable:
    post:
      tags:
        - LogCollectors
      summary: 停用日志采集规则
      responses:
        "200":
          description: OK
  /log_collector/rules/:id/enable:
    post:
      tags:
        - LogCollectors
      summary: 启用日志采集规则
      responses:
        "200":
          description: OK
  /log_collector/rules/:id/retry:
    post:
      tags:
        - LogCollectors
      summary: 重试日志采集规则
      responses:
        "200":
          description: OK
  /log_collector/storages/cluster_groups:
    get:
      tags:
        - LogCollectors
      summary: 获取 ES 存储集群
      responses:
        "200":
          description: OK
  /log_collector/storages/switch_storage:
    post:
      tags:
        - LogCollectors
      summary: 切换 ES 存储集群
      responses:
        "200":
          description: OK
  /memory_request_usage:
    get:
      tags:
        - Metrics
      summary: 集群内存装箱率
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
  /memory_usage:
    get:
      tags:
        - Metrics
      summary: 集群内存使用率
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
  /namespaces/:namespace/pod_monitors:
    get:
      tags:
        - Metrics
      summary: PodMonitor列表数据
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
    post:
      tags:
        - Metrics
      summary: PodMonitor列表数据
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
  /namespaces/:namespace/pod_monitors/:name:
    get:
      tags:
        - Metrics
      summary: 删除PodMonitor
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
    put:
      tags:
        - Metrics
      summary: PodMonitor列表数据
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
    delete:
      tags:
        - Metrics
      summary: 删除PodMonitor
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
  /namespaces/:namespace/pods/:pod/containers:
    get:
      tags:
        - Logs
      summary: 获取 Pod 容器列表
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_\
                    pkg_component_k8sclient.Container"
  /namespaces/:namespace/pods/:pod/logs:
    get:
      tags:
        - Logs
      summary: 查询容器日志
      parameters:
        - description: 容器名称
          name: container_name
          in: query
          required: true
          schema:
            type: string
        - description: 是否使用上一次日志, 异常退出使用
          name: previous
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_\
                    pkg_component_k8sclient.Log"
  /namespaces/:namespace/pods/:pod/logs/download:
    get:
      tags:
        - Logs
      summary: 下载日志
      parameters:
        - description: 容器名称
          name: container_name
          in: query
          required: true
          schema:
            type: string
        - description: 是否使用上一次日志, 异常退出使用
          name: previous
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
  /namespaces/:namespace/pods/:pod/logs/stream:
    get:
      tags:
        - Logs
      summary: SSE 实时日志流
      parameters:
        - description: 容器名称
          name: container_name
          in: query
          required: true
          schema:
            type: string
        - description: 开始时间
          name: started_at
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            text/event-stream:
              schema:
                type: string
  /namespaces/:namespace/pods/cpu_limit_usage:
    post:
      tags:
        - Metrics
      summary: Pod Limit CPU使用率
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
  /namespaces/:namespace/pods/cpu_request_usage:
    post:
      tags:
        - Metrics
      summary: Pod Request CPU使用率
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
  /namespaces/:namespace/pods/cpu_usage:
    post:
      tags:
        - Metrics
      summary: Pod CPU使用率
      responses:
        "200":
          description: OK
