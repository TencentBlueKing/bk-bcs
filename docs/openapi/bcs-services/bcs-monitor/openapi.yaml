servers:
  - url: /bcsapi/v4/monitor/api/projects/{projectId}/clusters/{clusterId}
    variables:
      projectId:
        default: unknown
      clusterId:
        default: unknown
components:
  schemas:
    github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_pkg_component_bk_log.Conditions:
      type: object
      properties:
        match_content:
          type: string
        match_type:
          description: include, exclude(开发中，暂不支持)
          type: string
        separator:
          description: 分隔符，| 等
          type: string
        separator_filters:
          description: 分隔符过滤条件
          type: array
          items:
            $ref: "#/components/schemas/github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_\
              pkg_component_bk_log.SeparatorFilters"
        type:
          description: match, separator
          type: string
    github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_pkg_component_bk_log.Container:
      type: object
      properties:
        container_name:
          type: string
        workload_name:
          type: string
        workload_type:
          type: string
    github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_pkg_component_bk_log.DataInfo:
      type: object
      properties:
        file_bkdata_data_id:
          description: 计算平台文件日志 dataid
          type: integer
        file_data_id:
          description: 文件日志 dataid
          type: integer
        std_bkdata_data_id:
          description: 计算平台标准输出日志 dataid
          type: integer
        std_data_id:
          description: 标准输出日志 dataid
          type: integer
    github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_pkg_component_bk_log.Label:
      type: object
      properties:
        key:
          type: string
        operator:
          type: string
        value:
          type: string
    github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_pkg_component_bk_log.LabelSelector:
      type: object
      properties:
        match_expressions:
          type: array
          items:
            $ref: "#/components/schemas/github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_\
              pkg_component_bk_log.Label"
        match_labels:
          type: array
          items:
            $ref: "#/components/schemas/github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_\
              pkg_component_bk_log.Label"
    github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_pkg_component_bk_log.LogRule:
      type: object
      properties:
        add_pod_label:
          type: boolean
        config:
          $ref: "#/components/schemas/github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_\
            pkg_component_bk_log.LogRuleContainer"
        data_info:
          $ref: "#/components/schemas/github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_\
            pkg_component_bk_log.DataInfo"
        extra_labels:
          type: array
          items:
            $ref: "#/components/schemas/github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_\
              pkg_component_bk_log.Label"
    github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_pkg_component_bk_log.LogRuleContainer:
      type: object
      properties:
        conditions:
          $ref: "#/components/schemas/github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_\
            pkg_component_bk_log.Conditions"
        container:
          $ref: "#/components/schemas/github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_\
            pkg_component_bk_log.Container"
        data_encoding:
          type: string
        enable_stdout:
          type: boolean
        label_selector:
          $ref: "#/components/schemas/github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_\
            pkg_component_bk_log.LabelSelector"
        multiline:
          $ref: "#/components/schemas/github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_\
            pkg_component_bk_log.Multiline"
        namespaces:
          type: array
          items:
            type: string
        paths:
          type: array
          items:
            type: string
    github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_pkg_component_bk_log.Multiline:
      type: object
      properties:
        multiline_max_lines:
          type: string
        multiline_pattern:
          type: string
        multiline_timeout:
          type: string
    github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_pkg_component_bk_log.SeparatorFilters:
      type: object
      properties:
        fieldindex:
          description: 匹配项所在列
          type: string
        logic_op:
          description: and, or
          type: string
        op:
          description: 匹配方式，目前只有 =
          type: string
        word:
          description: 匹配值
          type: string
    github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_pkg_component_k8sclient.Container:
      type: object
      properties:
        container_type:
          type: string
        name:
          type: string
    github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_pkg_component_k8sclient.Log:
      type: object
      properties:
        log:
          type: string
        time:
          type: string
    github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_pkg_utils.JSONTime:
      type: object
      properties:
        time.Time:
          type: string
    pkg_api_logrule.Entrypoint:
      type: object
      properties:
        file_bk_base_url:
          description: 跳转到数据平台地址
          type: string
        file_log_url:
          type: string
        std_bk_base_url:
          description: 跳转到数据平台地址
          type: string
        std_log_url:
          type: string
    pkg_api_logrule.GetLogRuleResp:
      type: object
      properties:
        created_at:
          $ref: "#/components/schemas/github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_\
            pkg_utils.JSONTime"
        creator:
          type: string
        description:
          type: string
        display_name:
          type: string
        entrypoint:
          $ref: "#/components/schemas/pkg_api_logrule.Entrypoint"
        file_index_set_id:
          type: integer
        id:
          type: string
        message:
          type: string
        name:
          type: string
        new_rule_id:
          description: 当旧规则转换过新规则后，显示该字段
          type: string
        old:
          type: boolean
        rule:
          $ref: "#/components/schemas/github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_\
            pkg_component_bk_log.LogRule"
        rule_file_index_set_id:
          type: integer
        rule_id:
          type: integer
        rule_name:
          type: string
        rule_std_index_set_id:
          type: integer
        status:
          type: string
        std_index_set_id:
          type: integer
        updated_at:
          $ref: "#/components/schemas/github_com_Tencent_bk-bcs_bcs-services_bcs-monitor_\
            pkg_utils.JSONTime"
        updator:
          type: string
