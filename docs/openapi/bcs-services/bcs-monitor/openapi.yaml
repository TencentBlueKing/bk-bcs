  /nodes/:node/diskio_usage:
    get:
      tags:
        - Metrics
      summary: 节点磁盘IO
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
  /nodes/:node/info:
    get:
      tags:
        - Metrics
      summary: 节点信息
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
  /nodes/:node/memory_request_usage:
    get:
      tags:
        - Metrics
      summary: 节点内存装箱率
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
  /nodes/:node/memory_usage:
    get:
      tags:
        - Metrics
      summary: 节点内存使用率
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
  /nodes/:node/network_receive:
    get:
      tags:
        - Metrics
      summary: 节点网络发送
      responses:
        "200":
          description: OK
          content:
