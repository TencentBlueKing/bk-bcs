            "*/*":
              schema:
                type: string
  /namespaces/namespace/pods/:pod/containers/:container/disk_read_total:
    get:
      tags:
        - Metrics
      summary: 容器磁盘读总量
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
  /namespaces/namespace/pods/:pod/containers/:container/disk_write_total:
    get:
      tags:
        - Metrics
      summary: 容器磁盘写总量
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
  /namespaces/namespace/pods/:pod/containers/:container/memory_limit:
    get:
      tags:
        - Metrics
      summary: 容器内存限制
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
  /namespaces/namespace/pods/:pod/containers/:container/memory_used:
    get:
      tags:
        - Metrics
      summary: 容器内存使用量
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
  /nodes/:node/cpu_request_usage:
    get:
      tags:
        - Metrics
      summary: 查询 CPU 装箱率
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
  /nodes/:node/cpu_usage:
    get:
      tags:
        - Metrics
      summary: 查询 CPU 使用率
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
  /nodes/:node/disk_usage:
    get:
      tags:
        - Metrics
      summary: 节点磁盘使用率
      responses:
        "200":
          description: OK
          content:
