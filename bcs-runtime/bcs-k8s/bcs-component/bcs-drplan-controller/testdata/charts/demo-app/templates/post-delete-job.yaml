apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-post-delete-notify
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-delete
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: notify
          image: "{{ .Values.dbMigrate.image }}"
          command: ["sh", "-c", "echo notify delete complete"]
