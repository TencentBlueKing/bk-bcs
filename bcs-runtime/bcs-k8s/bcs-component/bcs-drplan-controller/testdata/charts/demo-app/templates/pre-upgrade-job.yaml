apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-upgrade-prepare
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-2"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: prepare
          image: "{{ .Values.validate.image }}"
          command: ["sh", "-c", "echo prepare upgrade; sleep 1; echo ready"]
