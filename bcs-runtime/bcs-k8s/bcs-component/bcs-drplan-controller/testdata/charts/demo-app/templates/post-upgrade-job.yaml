apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-upgrade-verify
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: verify
          image: "busybox:1.36"
          command: ["sh", "-c", "echo verify upgrade; sleep 1; echo verify done"]
