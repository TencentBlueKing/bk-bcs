apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-validate
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "0"
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: validate
          image: "{{ .Values.validate.image }}"
          command: ["sh", "-c", "echo validate config; sleep 2; echo validation passed"]
