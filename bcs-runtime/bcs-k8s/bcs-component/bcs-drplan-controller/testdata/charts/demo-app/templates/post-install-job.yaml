apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-install-smoke
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: smoke
          image: "busybox:1.36"
          command: ["sh", "-c", "echo verify install; sleep 1; echo verify done"]
