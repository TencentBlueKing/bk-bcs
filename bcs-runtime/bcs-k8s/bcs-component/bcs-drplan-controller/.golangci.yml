# golangci-lint v2 configuration for bcs-drplan-controller
version: "2"

run:
  # Use Go 1.24 for compatibility (golangci-lint binary built with Go 1.24)
  go: "1.24"
  timeout: 10m
  modules-download-mode: readonly

linters:
  # Disable all linters by default, then enable specific ones
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - funlen
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - misspell
    - nakedret
    - revive
    - unconvert
    - unparam
  
  # Linter-specific settings (replaces linters-settings in v1)
  settings:
    staticcheck:
      checks: ["all", "-SA1006", "-SA1019"]
    
    errcheck:
      exclude-functions:
        - (*os.File).Close
        - (io.Closer).Close
        - (net/http.ResponseWriter).Write
        - github.com/go-chi/render.Render
        - io.Copy
        - os.RemoveAll
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    
    # funlen: 调整为 90 行/90 语句的限制
    funlen:
      lines: 90
      statements: -1
    
    gocyclo:
      min-complexity: 20
    
    govet:
      enable:
        - shadow
      disable:
        - printf
    
    gocritic:
      settings:
        ifElseChain:
          minThreshold: 3
    
    gosec:
      includes:
        - G201
        - G202
        - G101
        - G401
        - G402
        - G403
        - G404
        - G504
    
    goheader:
      # Pure text template (goheader will auto-add comment markers)
      # Based on hack/boilerplate.go.txt content
      template: |-
        Tencent is pleased to support the open source community by making Blueking Container Service available.
        Copyright (C) 2023 THL A29 Limited, a Tencent company. All rights reserved.
        Licensed under the MIT License (the "License"); you may not use this file except
        in compliance with the License. You may obtain a copy of the License at
        http://opensource.org/licenses/MIT
        Unless required by applicable law or agreed to in writing, software distributed under,
        the License is distributed on an "AS IS" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,
        either express or implied. See the License for the specific language governing permissions and
        limitations under the License.
    
    misspell:
      locale: US
    
    revive:
      confidence: 0
      # Explicitly disable all default rules and only enable what we need
      # This allows us to exclude dot-imports rule for Ginkgo/Gomega compatibility
      enable-all-rules: false
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        # dot-imports rule NOT included - test files use Ginkgo/Gomega dot imports
        - name: early-return
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: exported
        - name: increment-decrement
        - name: indent-error-flow
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: var-declaration
  
  # Exclusions (replaces issues.exclude-rules in v1)
  exclusions:
    generated: lax
    warn-unused: true
    # Exclude generated files
    paths:
      - ".*\\.docs\\.go$"
      - ".*\\.gen\\.go$"
      - ".*\\.pb\\.go$"
      - ".*\\.pb.gw\\.go$"
      - ".*\\.pb.micro\\.go$"
      - ".*\\.pb.validate\\.go$"
      - ".*zz_generated.*\\.go$"
      - vendor/
      - hack/
      - config/
      - ".*/third_party/.*"
    rules:
      # Test files can have higher complexity and skip error checks
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - funlen
          - gosec
      # Test files can use dot imports for Ginkgo/Gomega (BDD testing framework best practice)
      - path: _test\.go
        text: "dot-imports"
      - path: suite_test\.go
        text: "dot-imports"

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/Tencent/bk-bcs/bcs-runtime/bcs-k8s/bcs-component/bcs-drplan-controller

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
