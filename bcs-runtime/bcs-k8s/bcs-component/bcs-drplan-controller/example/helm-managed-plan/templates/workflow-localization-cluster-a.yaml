# DRWorkflow: Cluster A localization — replicas and nginx config overrides.
#
# Helm .Values.xxx controls deployment-time config (namespace, cluster identity).
# DR $(params.xxx) is resolved at plan execution time by the controller.
# These two syntaxes do not conflict.
apiVersion: dr.bkbcs.tencent.com/v1alpha1
kind: DRWorkflow
metadata:
  name: {{ .Release.Name }}-localization-{{ .Values.clusterA.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "nginx-drplan.labels" . | nindent 4 }}
spec:
  failurePolicy: FailFast
  parameters:
    - name: managedClusterNamespace
      type: string
      description: "ManagedCluster namespace for cluster A"
      default: {{ .Values.clusterA.managedClusterNamespace | quote }}
  actions:
    - name: create-localization-{{ .Values.clusterA.name }}
      type: Localization
      timeout: 1m
      localization:
        operation: Create
        name: nginx-overrides-{{ .Values.clusterA.name }}
        namespace: "$(params.managedClusterNamespace)"
        spec:
          priority: 500
          overridePolicy: ApplyNow
          feed:
            apiVersion: apps/v1
            kind: Deployment
            name: nginx
            namespace: "$(params.feedNamespace)"
          overrides:
            - name: replicas-{{ .Values.clusterA.name }}
              type: MergePatch
              value: |
                {"spec":{"replicas":{{ .Values.clusterA.replicas }}}}
